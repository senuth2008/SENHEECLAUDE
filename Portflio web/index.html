<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sen_Hee | Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --surface: #0d1120;
  --surface2: #141828;
  --cyan: #00CFFF;
  --pink: #ff2d78;
  --text: #f0f4ff;
  --muted: rgba(240,244,255,0.5);
  --border: rgba(0,207,255,0.12);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed;
  width: 10px; height: 10px;
  background: var(--cyan);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: transform 0.1s, width 0.2s, height 0.2s, opacity 0.2s;
  mix-blend-mode: difference;
}
#cursor-ring {
  position: fixed;
  width: 36px; height: 36px;
  border: 1.5px solid rgba(0,207,255,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  transition: transform 0.18s ease, width 0.25s, height 0.25s, border-color 0.2s;
}
body:has(a:hover) #cursor, body:has(.card:hover) #cursor { width: 6px; height: 6px; }
body:has(a:hover) #cursor-ring, body:has(.card:hover) #cursor-ring {
  width: 52px; height: 52px;
  border-color: rgba(0,207,255,0.8);
}

/* ── CANVAS BG ── */
#bgCanvas {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.6;
}

/* ── LOADER ── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 8000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
}
.loader-reel {
  display: flex;
  gap: 6px;
  align-items: center;
}
.reel-hole {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--cyan);
  animation: reelSpin 0.6s ease-in-out infinite alternate;
}
.reel-hole:nth-child(2) { animation-delay: 0.1s; background: var(--pink); }
.reel-hole:nth-child(3) { animation-delay: 0.2s; }
.reel-hole:nth-child(4) { animation-delay: 0.3s; background: var(--pink); }
.reel-hole:nth-child(5) { animation-delay: 0.4s; }
@keyframes reelSpin {
  from { transform: scaleY(1); opacity: 1; }
  to   { transform: scaleY(0.2); opacity: 0.3; }
}
.loader-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  letter-spacing: 0.25em;
  color: var(--cyan);
  animation: textPulse 1.4s ease-in-out infinite;
  text-align: center;
  padding: 0 1rem;
}
@keyframes textPulse {
  0%, 100% { opacity: 0.6; }
  50%       { opacity: 1; }
}
.loader-bar-wrap {
  width: min(320px, 80vw);
  height: 2px;
  background: rgba(0,207,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  border-radius: 2px;
  width: 0%;
  animation: loadBar 1.6s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes loadBar { to { width: 100%; } }
#loader.out {
  animation: loaderOut 0.7s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes loaderOut {
  to { opacity: 0; pointer-events: none; }
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 4%;
  background: rgba(6,8,16,0.7);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
}
.logo-wrap img {
  height: 32px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}
.logo-fallback {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.15em;
  color: var(--cyan);
  display: none;
}
nav {
  display: flex;
  align-items: center;
  gap: 32px;
}
nav a {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
  position: relative;
}
nav a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: var(--cyan);
  transform: scaleX(0);
  transition: transform 0.25s ease;
  transform-origin: left;
}
nav a:hover { color: var(--text); }
nav a:hover::after { transform: scaleX(1); }
.nav-cta {
  padding: 8px 20px;
  background: var(--cyan);
  color: #000 !important;
  font-family: 'DM Mono', monospace !important;
  font-size: 0.75rem !important;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-radius: 4px;
  text-decoration: none;
  transition: box-shadow 0.25s, transform 0.2s !important;
}
.nav-cta:hover {
  box-shadow: 0 0 24px rgba(0,207,255,0.5);
  transform: translateY(-1px);
}
.nav-cta::after { display: none !important; }

/* ── HERO ── */
#about {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 4% 80px;
  position: relative;
  z-index: 2;
}
.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.8s 1.8s ease forwards;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 12vw, 9rem);
  line-height: 0.92;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  opacity: 0;
  animation: fadeUp 0.9s 1.9s ease forwards;
}

/* ── NEW TEXT EFFECT ── */
.hero-title span {
  display: block;
}

.electric {
  background: linear-gradient(90deg, var(--cyan), var(--pink), var(--cyan));
  background-size: 200% auto;
  -webkit-background-clip: text;
  color: transparent;
  animation: gradientFlow 4s linear infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}

.hero-sub {
  max-width: 560px;
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--muted);
  margin: 20px auto 0;
  opacity: 0;
  animation: fadeUp 0.9s 2.05s ease forwards;
}
.hero-actions {
  display: flex;
  gap: 14px;
  margin-top: 44px;
  flex-wrap: wrap;
  justify-content: center;
  opacity: 0;
  animation: fadeUp 0.9s 2.15s ease forwards;
}
.btn-primary, .btn-ghost {
  padding: 14px 32px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.25s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: var(--cyan);
  color: #000;
}
.btn-primary:hover {
  box-shadow: 0 0 32px rgba(0,207,255,0.6);
  transform: translateY(-2px);
}
.btn-ghost {
  border: 1px solid rgba(0,207,255,0.35);
  color: var(--text);
}
.btn-ghost:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  transform: translateY(-2px);
}
.scroll-hint {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeUp 1s 2.4s ease forwards;
}
.scroll-hint span {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--muted);
}
.scroll-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, var(--cyan), transparent);
  animation: scrollPulse 1.8s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity: 0.3; transform: scaleY(1); }
  50%      { opacity: 1;   transform: scaleY(1.1); }
}

/* rest unchanged */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<section id="about">
  <p class="hero-eyebrow">Video Editor · Visual Storyteller</p>
  <h1 class="hero-title">
    Hi, I'm<br>
    <span class="electric">SEN_HEE</span>
  </h1>
  <p class="hero-sub">I craft videos that grab attention, drive results, and make your brand completely unforgettable.</p>
</section>

</body>
</html>
